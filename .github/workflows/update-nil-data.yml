name: Update POPS NFL Data

on:
  workflow_dispatch:

  schedule:
    - cron: "15 10 * * *"

permissions:
  contents: write

concurrency:
  group: update-pops-nfl-data
  cancel-in-progress: false

jobs:
  build-nfl-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build NFL data
        run: node scripts/build-nfl.js

      - name: Commit updated NFL data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/teams.json
          git add data/team-stats.json
          git add data/player-stats.json
          git add data/upcoming-games.json

          if git diff --cached --quiet; then
            echo "No NFL data changes to commit."
          else
            git commit -m "Update POPS NFL data"
            git push
          fi
